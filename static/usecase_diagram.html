<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Use-Case Diagram — AI Stock Forecasting System</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'IBM Plex Sans', sans-serif;
    background: #f5f3ee;
    padding: 40px 24px;
    min-height: 100vh;
  }
  h1 {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #9a9690;
    text-align: center;
    margin-bottom: 36px;
  }
  svg { display: block; margin: 0 auto; }
</style>
</head>
<body>
<h1>Use-Case Diagram — AI-Based Stock Market Forecasting System</h1>
<svg width="860" height="620" viewBox="0 0 860 620" xmlns="http://www.w3.org/2000/svg"
     font-family="IBM Plex Sans, sans-serif">

  <!-- System boundary -->
  <rect x="160" y="40" width="540" height="540" rx="6"
        fill="#faf9f6" stroke="#d0ccc2" stroke-width="1.5"/>
  <text x="430" y="28" text-anchor="middle"
        font-family="IBM Plex Mono, monospace" font-size="10"
        letter-spacing="0.14em" fill="#9a9690" text-transform="uppercase">
    «system» AI Stock Forecasting System
  </text>

  <!-- ── ACTOR 1: Trader ── -->
  <!-- head -->
  <circle cx="72" cy="200" r="16" fill="none" stroke="#3a3630" stroke-width="1.5"/>
  <!-- body -->
  <line x1="72" y1="216" x2="72" y2="270" stroke="#3a3630" stroke-width="1.5"/>
  <!-- arms -->
  <line x1="72" y1="235" x2="44" y2="255" stroke="#3a3630" stroke-width="1.5"/>
  <line x1="72" y1="235" x2="100" y2="255" stroke="#3a3630" stroke-width="1.5"/>
  <!-- legs -->
  <line x1="72" y1="270" x2="50" y2="300" stroke="#3a3630" stroke-width="1.5"/>
  <line x1="72" y1="270" x2="94" y2="300" stroke="#3a3630" stroke-width="1.5"/>
  <text x="72" y="318" text-anchor="middle" font-size="12" font-weight="600" fill="#1a1814">Trader</text>
  <text x="72" y="332" text-anchor="middle" font-size="10" fill="#9a9690">/ Investor</text>

  <!-- ── ACTOR 2: System Administrator ── -->
  <circle cx="72" cy="460" r="16" fill="none" stroke="#3a3630" stroke-width="1.5"/>
  <line x1="72" y1="476" x2="72" y2="530" stroke="#3a3630" stroke-width="1.5"/>
  <line x1="72" y1="495" x2="44" y2="515" stroke="#3a3630" stroke-width="1.5"/>
  <line x1="72" y1="495" x2="100" y2="515" stroke="#3a3630" stroke-width="1.5"/>
  <line x1="72" y1="530" x2="50" y2="560" stroke="#3a3630" stroke-width="1.5"/>
  <line x1="72" y1="530" x2="94" y2="560" stroke="#3a3630" stroke-width="1.5"/>
  <text x="72" y="578" text-anchor="middle" font-size="12" font-weight="600" fill="#1a1814">System</text>
  <text x="72" y="592" text-anchor="middle" font-size="10" fill="#9a9690">Administrator</text>

  <!-- ── USE CASES (ellipses) ── -->

  <!-- UC1: Authenticate -->
  <ellipse cx="310" cy="90" rx="110" ry="28" fill="#fff" stroke="#d0ccc2" stroke-width="1"/>
  <text x="310" y="95" text-anchor="middle" font-size="12" fill="#1a1814">Authenticate / Log In</text>

  <!-- UC2: Submit Stock Query -->
  <ellipse cx="560" cy="150" rx="120" ry="28" fill="#fff" stroke="#d0ccc2" stroke-width="1"/>
  <text x="560" y="155" text-anchor="middle" font-size="12" fill="#1a1814">Submit Stock Ticker Query</text>

  <!-- UC3: View Trading Signal -->
  <ellipse cx="540" cy="230" rx="125" ry="28" fill="#fff" stroke="#d0ccc2" stroke-width="1"/>
  <text x="540" y="235" text-anchor="middle" font-size="12" fill="#1a1814">View Trading Signal (B/H/S)</text>

  <!-- UC4: View Survival Curve -->
  <ellipse cx="550" cy="310" rx="130" ry="28" fill="#fff" stroke="#d0ccc2" stroke-width="1"/>
  <text x="550" y="308" text-anchor="middle" font-size="12" fill="#1a1814">View Survival Curve &amp;</text>
  <text x="550" y="322" text-anchor="middle" font-size="12" fill="#1a1814">Reversal Probabilities</text>

  <!-- UC5: View Duration Estimate -->
  <ellipse cx="540" cy="390" rx="130" ry="28" fill="#fff" stroke="#d0ccc2" stroke-width="1"/>
  <text x="540" y="388" text-anchor="middle" font-size="12" fill="#1a1814">View Median Duration</text>
  <text x="540" y="402" text-anchor="middle" font-size="12" fill="#1a1814">Estimate</text>

  <!-- UC6: Review Sentiment -->
  <ellipse cx="320" cy="310" rx="120" ry="28" fill="#fff" stroke="#d0ccc2" stroke-width="1"/>
  <text x="320" y="315" text-anchor="middle" font-size="12" fill="#1a1814">Review Sentiment Breakdown</text>

  <!-- UC7: Chat with AI -->
  <ellipse cx="320" cy="390" rx="110" ry="28" fill="#fff" stroke="#d0ccc2" stroke-width="1"/>
  <text x="320" y="395" text-anchor="middle" font-size="12" fill="#1a1814">Chat with AI Assistant</text>

  <!-- UC8: Manage Data -->
  <ellipse cx="430" cy="520" rx="130" ry="28" fill="#fff" stroke="#d0ccc2" stroke-width="1"/>
  <text x="430" y="518" text-anchor="middle" font-size="12" fill="#1a1814">Manage Market Data &amp;</text>
  <text x="430" y="532" text-anchor="middle" font-size="12" fill="#1a1814">Trend Episodes</text>

  <!-- ── ASSOCIATIONS (actor → use case lines) ── -->

  <!-- Trader → Authenticate -->
  <line x1="100" y1="200" x2="200" y2="100" stroke="#8a8680" stroke-width="1"/>
  <!-- Trader → Submit -->
  <line x1="100" y1="210" x2="440" y2="155" stroke="#8a8680" stroke-width="1"/>
  <!-- Trader → View Signal -->
  <line x1="100" y1="220" x2="415" y2="232" stroke="#8a8680" stroke-width="1"/>
  <!-- Trader → Survival -->
  <line x1="100" y1="240" x2="420" y2="312" stroke="#8a8680" stroke-width="1"/>
  <!-- Trader → Duration -->
  <line x1="100" y1="255" x2="410" y2="392" stroke="#8a8680" stroke-width="1"/>
  <!-- Trader → Sentiment -->
  <line x1="100" y1="235" x2="200" y2="312" stroke="#8a8680" stroke-width="1"/>
  <!-- Trader → Chat -->
  <line x1="100" y1="250" x2="210" y2="392" stroke="#8a8680" stroke-width="1"/>

  <!-- Admin → Authenticate -->
  <line x1="100" y1="460" x2="200" y2="108" stroke="#8a8680" stroke-width="1" stroke-dasharray="4,3"/>
  <!-- Admin → Manage Data -->
  <line x1="100" y1="475" x2="300" y2="522" stroke="#8a8680" stroke-width="1"/>

  <!-- «include» Submit → View Signal (dashed) -->
  <line x1="440" y1="162" x2="415" y2="220" stroke="#aaa69e" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="395" y="195" font-size="9" fill="#9a9690" font-family="IBM Plex Mono, monospace">«include»</text>

  <!-- «include» Submit → Survival -->
  <line x1="450" y1="170" x2="430" y2="295" stroke="#aaa69e" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="408" y="240" font-size="9" fill="#9a9690" font-family="IBM Plex Mono, monospace">«include»</text>

  <!-- «include» Submit → Duration -->
  <line x1="455" y1="172" x2="420" y2="378" stroke="#aaa69e" stroke-width="1" stroke-dasharray="5,3"/>

  <!-- «extend» Chat → Signal (dashed arrow) -->
  <line x1="320" y1="362" x2="430" y2="248" stroke="#aaa69e" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="340" y="300" font-size="9" fill="#9a9690" font-family="IBM Plex Mono, monospace">«extend»</text>

  <!-- legend -->
  <rect x="170" y="56" width="12" height="1" fill="none" stroke="#8a8680" stroke-width="1"/>
  <text x="188" y="61" font-size="9" fill="#9a9690" font-family="IBM Plex Mono, monospace">association</text>
  <line x1="260" y1="60" x2="310" y2="60" stroke="#aaa69e" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="318" y="64" font-size="9" fill="#9a9690" font-family="IBM Plex Mono, monospace">«include» / «extend»</text>

</svg>
</body>
</html>
